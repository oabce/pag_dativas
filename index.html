<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Entrar</h1>

      <form class="form-stack" id="login-form">
        <label for="perfil">Tipo de acesso</label>
        <select id="perfil" name="perfil">
          <option value="advogado">Acesso advogado</option>
          <option value="administrador">Acesso administrador</option>
        </select>

        <label for="login" id="login-label">Numero da OAB</label>
        <input id="login" name="login" type="text" placeholder="Digite seu numero da OAB">

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" placeholder="Digite sua senha">

        <button type="submit">Entrar</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
